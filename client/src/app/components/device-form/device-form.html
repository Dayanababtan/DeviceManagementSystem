<div class="form-container">
  <div class="form-card">
    <div class="form-header">
      <h2>{{ isEditMode ? 'Update' : 'Create' }} Device</h2>
      <p class="subtitle">Enter the details below to manage your hardware.</p>
    </div>

    <form [formGroup]="deviceForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Device Name</label>
        <input 
          type="text" 
          formControlName="name" 
          placeholder="e.g. iPhone 15 Pro"
          [class.is-invalid]="deviceForm.get('name')?.invalid && deviceForm.get('name')?.touched"
        >
        <div class="error-msg" *ngIf="deviceForm.get('name')?.invalid && deviceForm.get('name')?.touched">
          Device name is required (min. 2 characters).
        </div>
      </div>

      <div class="form-group">
        <label>Manufacturer</label>
        <input 
          type="text" 
          formControlName="manufacturer" 
          placeholder="e.g. Apple"
          [class.is-invalid]="deviceForm.get('manufacturer')?.invalid && deviceForm.get('manufacturer')?.touched"
        >
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Type</label>
          <select formControlName="type">
            <option value="" disabled>Select Type</option>
            <option value="Smartphone">Smartphone</option>
            <option value="Tablet">Tablet</option>
          </select>
        </div>

        <div class="form-group">
          <label>RAM (GB)</label>
          <input type="text" formControlName="ramAmount" placeholder="e.g. 16">
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-cancel" routerLink="/">Cancel</button>
        <button type="submit" class="btn btn-save" [disabled]="deviceForm.invalid">
          {{ isEditMode ? 'Update Changes' : 'Save Device' }}
        </button>
      </div>
    </form>
  </div>
</div>
