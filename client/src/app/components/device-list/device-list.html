<div class="page-container">
  <div class="header-actions">
    <h1>Device Inventory</h1>
    <button class="btn btn-primary" routerLink="/add">
      <span class="plus-icon">+</span> Add New Device
    </button>
  </div>
  <div class="search-container">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input
        #searchBox
        type="text"
        placeholder="Search by name, manufacturer, RAM or processor..."
        (input)="search(searchBox.value)"
      />
    </div>
  </div>

  <div class="table-card">
    <table class="custom-table">
      <thead>
        <tr>
          <th>Device Name</th>
          <th>Owner</th>
          <th>Type</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let dev of devicesWithUsers$ | async">
          <td class="font-bold">{{ dev.name }}</td>

          <td>
            <span class="user-badge" [class.unassigned]="dev.userId === null">
              {{ dev.ownerName }}
            </span>
          </td>

          <td>
            <span class="type-tag" [ngClass]="dev.type.toLowerCase()">
              {{ dev.type }}
            </span>
          </td>

          <td class="actions-cell">
            <button
              class="btn-icon btn-details"
              [routerLink]="['/details', dev.deviceId]"
              title="View Details"
            >
              👁
            </button>

            <ng-container *ngIf="dev.userId === null || dev.userId === currentUserId">
              <button
                class="btn-icon btn-edit"
                [routerLink]="['/edit', dev.deviceId]"
                title="Edit Device"
              >
                ✎
              </button>
              <button
                class="btn-icon btn-delete"
                (click)="deleteDevice(dev.deviceId)"
                title="Delete Device"
              >
                ×
              </button>
            </ng-container>

            <span
              *ngIf="dev.userId !== null && dev.userId !== currentUserId"
              class="lock-indicator"
              title="Owned by another user"
            >
              🔒
            </span>
          </td>
        </tr>

        <tr *ngIf="(devicesWithUsers$ | async)?.length === 0">
          <td colspan="4" class="empty-message">
            No devices found. Click "Add New Device" to get started.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
