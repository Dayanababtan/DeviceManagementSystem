<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Join the Device Management System</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" placeholder="Alice Johnson" 
               [class.error]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="name@company.com"
               [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••"
               [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
        <small class="hint">Must be at least 6 characters</small>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-auth" [disabled]="registerForm.invalid || loading">
        {{ loading ? 'Creating Account...' : 'Register' }}
      </button>

      <div class="auth-footer">
        Already have an account? <a routerLink="/login">Login here</a>
      </div>
    </form>
  </div>
</div>
